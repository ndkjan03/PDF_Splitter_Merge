name: Build PDF Tool

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:

  build-windows:

    name: Build Windows

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows EXE
        run: |
          pyinstaller --clean --onefile --name pdf --icon=pdf_icon.ico pdf_tool.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-windows
          path: dist/pdf.exe

  build-macos:

    name: Build macOS

    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS Binary
        run: |
          pyinstaller --clean --onefile --name pdf --icon=pdf_icons.icns pdf_tool.py

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-macos
          path: dist/pdf