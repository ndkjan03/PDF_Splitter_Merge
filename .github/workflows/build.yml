name: Build PDF Tool

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  build-windows:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller ^
            --clean ^
            --onefile ^
            --name pdf ^
            pdf_tool.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-windows
          path: dist/pdf.exe